<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Travel Opportunity Calculator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<header>
<h1>Travel Opportunity Calculator</h1>
<p class="subtitle">How many flights could you have taken instead?</p>
<button id="darkToggle" class="dark-toggle" aria-label="Toggle dark mode">
<span class="icon-sun">&#9788;</span>
<span class="icon-moon">&#9790;</span>
</button>
</header>

<div class="card">
<div class="grid">
<div>
<label for="hours">Hours</label>
<input type="number" id="hours" value="207" min="0">
</div>
<div>
<label for="minutes">Minutes</label>
<input type="number" id="minutes" value="55" min="0" max="59">
</div>
</div>

<label for="from-select">Departure Airport</label>
<select id="from-select" placeholder="Search by city, airport name, or code..."></select>

<label for="to-select">Arrival Airport</label>
<select id="to-select" placeholder="Search by city, airport name, or code..."></select>

<button id="calcBtn" class="btn-primary">Calculate</button>
</div>

<div class="card hero" id="results" style="display:none">
<div id="funFact"></div>
<div id="worldTrips"></div>
<div class="stats">
<div class="stat"><span id="oneWay">—</span><small>One-Way Trips</small></div>
<div class="stat"><span id="roundTrip">—</span><small>Round Trips</small></div>
<div class="stat"><span id="flightTime">—</span><small>Flight Hours</small></div>
<div class="stat"><span id="distance">—</span><small>Miles</small></div>
</div>
</div>

<div class="card" id="comparisonsCard" style="display:none">
<h2>Other Places You Could Have Gone (One Way)</h2>
<div id="comparisons"></div>
</div>

<div class="card loading-card" id="loadingCard">
<div class="spinner"></div>
<p id="loadingText">Loading airport database...</p>
</div>

<footer>
<button id="shareBtn" class="btn-share" style="display:none">Copy Shareable Link</button>
<p class="footer-note" id="airportCount"></p>
</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="app.js"></script>
</body>
</html>
